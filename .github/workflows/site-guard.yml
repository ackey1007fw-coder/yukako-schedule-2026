name: Site Identity Guard

# This repository is the Yoshii Yukako fan portal only.
# Guard main against accidental copied data from the former Riri shared-repo history.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check site identity matches branch
        run: node scripts/check-site-identity.mjs "${{ github.base_ref || github.ref_name }}"
