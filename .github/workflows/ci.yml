name: CI

# PR ごとの品質ゲート。自動マージは行わない（マージは人間のオーナーのみ）。
on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Add news CLI tests
        run: pnpm test:add-news

      - name: Gojet status tests
        run: pnpm test:gojet

      - name: Build
        run: pnpm build

      - name: Site identity guard
        run: node scripts/check-site-identity.mjs main
