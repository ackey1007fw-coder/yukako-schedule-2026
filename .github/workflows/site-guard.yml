name: Site Identity Guard

# このリポジトリ（ackey1007fw-coder/yukako-schedule-2026）は吉井優花子さん専用。
# 旧: riri-schedule-2026 の yukako/main ブランチから独立した経緯があるため、
# 誤って夏凪里季さん側のデータがコピー混入していないかを検知する。

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check site identity
        run: node scripts/check-site-identity.mjs
